  <text x="430" y="118"
        font-family="ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, Helvetica, Arial, sans-serif"
        font-size="52" font-weight="600" fill="#f0f6fc" letter-spacing="-1">
    linux consumer labs
  </text>

  <text x="430" y="168"
        font-family="ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, Helvetica, Arial, sans-serif"
