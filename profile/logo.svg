<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512" role="img" aria-label="linux consumer labs logo">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#161b22"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2dd4bf"/>
      <stop offset="100%" stop-color="#38bdf8"/>
    </linearGradient>
  </defs>

  <rect width="512" height="512" fill="url(#bg)"/>

  <!-- bridge mark: drawn symmetrically around (256, 256) -->
  <g transform="translate(256 296)">
    <path d="M -144 36
             C -144 -44, -96 -116, -48 -116
             C -24 -116, -8 -102, 0 -86
             C 8 -102, 24 -116, 48 -116
             C 96 -116, 144 -44, 144 36"
          fill="none"
          stroke="url(#accent)"
          stroke-width="24"
          stroke-linecap="round"
          stroke-linejoin="round"/>
    <line x1="-128" y1="36" x2="128" y2="36"
          stroke="url(#accent)"
          stroke-width="24"
          stroke-linecap="round"/>
  </g>
</svg>
