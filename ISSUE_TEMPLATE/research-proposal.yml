name: Research Proposal
description: Propose a structured investigation into a Linux desktop consumer friction point
title: "[Research] "
labels:
  - research
  - needs-evidence
body:
  - type: markdown
    attributes:
      value: |
        Use this template for concrete topics worth investigating. See [CONTRIBUTING.md](https://github.com/Linux-Consumer-Labs/.github/blob/main/CONTRIBUTING.md) for guidance.

  - type: textarea
    id: problem
    attributes:
      label: Problem Statement
      description: Describe the consumer-facing friction in plain language. Who is affected? When does it happen?
      placeholder: "When a user plugs in a new printer, they expect..."
    validations:
      required: true

  - type: textarea
    id: linux-today
    attributes:
      label: How Linux Handles This Today
      description: Current behavior, common workarounds, and where the experience breaks down.
    validations:
      required: true

  - type: textarea
    id: other-os
    attributes:
      label: How Other OSes Handle This
      description: What do macOS, Windows, ChromeOS, or others do? What works well? What would not translate directly?
    validations:
      required: false

  - type: textarea
    id: what-if
    attributes:
      label: What-If Direction
      description: One or more exploratory directions — even if unconventional by Linux standards.
      placeholder: "What if we treated this like..."
    validations:
      required: false

  - type: textarea
    id: kernel-boundary
    attributes:
      label: Kernel & Upstream Boundaries
      description: What must stay in kernel/userspace as-is? What can be layered on top without fighting upstream?
    validations:
      required: false

  - type: checkboxes
    id: deliverables
    attributes:
      label: Expected Deliverables
      options:
        - label: Research brief / write-up
        - label: Cross-platform comparison matrix
        - label: User journey map
        - label: Prototype spike (separate repo)
        - label: Recommendation for distros or DEs

  - type: textarea
    id: references
    attributes:
      label: References
      description: Links, bug reports, prior art, or personal experience notes.
    validations:
      required: false
